<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HamzaEditz 2.0 - SIM Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f0f12;
            --card-light: #1f1f1f;
            --input-dark: #070708;
            --accent-gradient: linear-gradient(90deg, #8E2DE2, #4A00E0);
            --purple-main: #8E2DE2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            min-height: 100vh;
        }

        .gemini-title {
            font-weight: 800;
            font-size: clamp(2rem, 8vw, 3.5rem);
            background: linear-gradient(90deg, #8E2DE2, #4A00E0, #ff0080, #7928ca, #8E2DE2);
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
            letter-spacing: -0.5px;
        }

        @keyframes shine {
            to {
                background-position: 300% center;
            }
        }

        .search-input {
            background-color: var(--input-dark) !important;
            border: 1px solid #222;
            color: white;
            transition: all 0.3s ease;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            font-size: 1rem;
        }

        .search-input::placeholder {
            color: #888;
        }

        .search-input:focus {
            border-color: var(--purple-main);
            box-shadow: 0 0 15px rgba(142, 45, 226, 0.4);
            outline: none;
        }

        .result-card {
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.95) 0%, rgba(20, 20, 20, 0.95) 100%);
            border: 1px solid rgba(142, 45, 226, 0.2);
            border-left: 3px solid var(--purple-main);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            animation: slideIn 0.4s ease-out;
        }

        .result-card:hover {
            border-left: 3px solid #ff0080;
            box-shadow: 0 15px 40px rgba(142, 45, 226, 0.2);
            transform: translateY(-2px);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.875rem;
            border-bottom: 1px solid rgba(142, 45, 226, 0.1);
            gap: 0.75rem;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-item-content {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .result-item-icon {
            color: var(--purple-main);
            flex-shrink: 0;
            width: 20px;
            height: 20px;
        }

        .result-item-text {
            flex: 1;
            min-width: 0;
        }

        .result-item-label {
            font-size: 0.625rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .result-item-value {
            font-size: 0.875rem;
            font-weight: 500;
            color: #e0e0e0;
            word-break: break-all;
        }

        .copy-btn {
            background: rgba(142, 45, 226, 0.15);
            border: 1px solid var(--purple-main);
            color: var(--purple-main);
            padding: 0.5rem 0.875rem;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            background: var(--purple-main);
            color: white;
            box-shadow: 0 0 12px rgba(142, 45, 226, 0.6);
            transform: scale(1.05);
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.875rem;
            padding-bottom: 0.875rem;
            border-bottom: 1px solid rgba(142, 45, 226, 0.2);
            color: #8E2DE2;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .card-number {
            display: inline-block;
            background: rgba(142, 45, 226, 0.1);
            border: 1px solid var(--purple-main);
            color: var(--purple-main);
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: auto;
        }

        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
        }

        .spinner {
            width: 3.5rem;
            height: 3.5rem;
            border: 3px solid rgba(142, 45, 226, 0.2);
            border-top: 3px solid var(--purple-main);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loader-text {
            color: var(--purple-main);
            font-weight: 600;
            font-size: 0.875rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        .error-box {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.1) 0%, rgba(185, 28, 28, 0.1) 100%);
            border: 1px solid rgba(220, 38, 38, 0.5);
            border-left: 3px solid #dc2626;
            padding: 1rem;
            border-radius: 8px;
            color: #fca5a5;
            text-align: center;
            font-weight: 500;
            font-size: 0.875rem;
            animation: slideIn 0.4s ease-out;
        }

        .search-container {
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.8) 0%, rgba(20, 20, 20, 0.8) 100%);
            border: 1px solid rgba(142, 45, 226, 0.2);
            padding: 1.25rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .search-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        @media (min-width: 640px) {
            .search-wrapper {
                flex-direction: row;
                gap: 0.75rem;
            }
        }

        .search-input-wrapper {
            position: relative;
            flex: 1;
        }

        .search-input-wrapper i {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--purple-main);
            width: 20px;
            height: 20px;
        }

        .search-btn {
            background: var(--accent-gradient);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.875rem;
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            white-space: nowrap;
            min-height: 44px;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(142, 45, 226, 0.4);
        }

        .search-btn:active {
            transform: translateY(0);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
        }

        .no-data {
            padding: 2rem;
            text-align: center;
            color: #888;
            font-size: 0.875rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-subtitle {
            color: #666;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            letter-spacing: 0.5px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .header-subtitle i {
            width: 16px;
            height: 16px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        @media (min-width: 640px) {
            .container {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 class="gemini-title">HamzaEditz 2.0</h1>
            <div class="header-subtitle">
                <i data-feather="cpu"></i>
                <span>Secure SIM Info Retrieval</span>
            </div>
        </header>

        <div class="search-container">
            <div class="search-wrapper">
                <div class="search-input-wrapper">
                    <i data-feather="smartphone"></i>
                    <input type="tel" id="phoneInput" class="search-input w-full" placeholder="03XXXXXXXXX" autocomplete="off">
                </div>
                <button onclick="fetchData()" id="searchBtn" class="search-btn">
                    <i data-feather="search" style="width: 18px; height: 18px;"></i>
                    <span>Search</span>
                </button>
            </div>
        </div>

        <div id="loader" class="hidden loader">
            <div class="spinner"></div>
            <p class="loader-text">Fetching data...</p>
        </div>

        <div id="errorBox" class="hidden error-box"></div>

        <div id="resultsGrid" class="results-grid"></div>
    </div>

    <script>
        const API_BASE = "https://simowner.net.pk/ajax-handler.php?number=";

        // Map API response fields to display names and icons
        const fieldMapping = {
            'Name': { label: 'Name', icon: 'user' },
            'CNIC': { label: 'CNIC', icon: 'credit-card' },
            'Mobile': { label: 'Mobile', icon: 'phone' },
            'ADDRESS': { label: 'Address', icon: 'map-pin' }
        };

        async function fetchData() {
            const input = document.getElementById('phoneInput');
            const grid = document.getElementById('resultsGrid');
            const loader = document.getElementById('loader');
            const errorBox = document.getElementById('errorBox');

            let phone = input.value.trim();
            if (!phone) {
                showError('Please enter a phone number');
                return;
            }

            grid.innerHTML = '';
            errorBox.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                const response = await fetch(API_BASE + phone);
                const data = await response.json();

                if (Array.isArray(data) && data.length > 0) {
                    renderRecords(data);
                } else {
                    showError('No records found for this number');
                }
            } catch (err) {
                console.error('Error:', err);
                showError('Error fetching data. Please try again.');
            } finally {
                loader.classList.add('hidden');
                feather.replace();
            }
        }

        function renderRecords(records) {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';

            records.forEach((record, index) => {
                const card = document.createElement('div');
                card.className = 'result-card p-4';

                let fields = '';

                for (const [key, mapping] of Object.entries(fieldMapping)) {
                    const value = record[key];
                    if (value && value.trim() !== '' && value.toLowerCase() !== 'no') {
                        fields += `
                            <div class="result-item">
                                <div class="result-item-content">
                                    <i data-feather="${mapping.icon}" class="result-item-icon"></i>
                                    <div class="result-item-text">
                                        <div class="result-item-label">${mapping.label}</div>
                                        <div class="result-item-value">${escapeHtml(value)}</div>
                                    </div>
                                </div>
                                <button class="copy-btn" onclick="copyText('${escapeHtml(value)}', this)">Copy</button>
                            </div>`;
                    }
                }

                card.innerHTML = `
                    <div class="card-header">
                        <i data-feather="cpu" style="width: 16px; height: 16px;"></i>
                        <span>SIM Data</span>
                        <span class="card-number">#{(index + 1)}</span>
                    </div>
                    ${fields || '<div class="no-data">No valid data available</div>'}
                `;

                grid.appendChild(card);
            });

            feather.replace();
        }

        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const oldText = btn.innerText;
                btn.innerText = 'Copied!';
                btn.classList.add('bg-purple-600');
                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.classList.remove('bg-purple-600');
                }, 1500);
            }).catch(() => {
                showError('Failed to copy text');
            });
        }

        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            errorBox.innerText = msg;
            errorBox.classList.remove('hidden');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Enter key support
        document.getElementById('phoneInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                fetchData();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            feather.replace();
        });
    </script>
</body>
</html>
