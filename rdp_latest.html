<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Github RDP</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
<style>
:root {
  --primary-gradient: linear-gradient(90deg, #1f7a4d, #4fc06a);
  --primary-color: #1f7a4d;
  --bg-page: #f2f6f2;
  --panel: #ffffff;
  --panel-alt: #eef6f0;
  --border-color: #dfe9e2;
  --ink: #10241a;
  --muted: #6b7d73;
}
body { font-family: 'Poppins', sans-serif; background-color: var(--bg-page); color: var(--ink); }
.gemini-title {
  font-weight: 800;
  background: linear-gradient(90deg, #1f7a4d, #4fc06a, #a4e83c, #22a26b, #1f7a4d);
  background-size: 400% 100%;
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  animation: gemini-shimmer 8s linear infinite;
}
@keyframes gemini-shimmer { 0% { background-position: 0% 50%; } 100% { background-position: 400% 50%; } }
.btn-gradient { background: var(--primary-gradient); transition: opacity 0.2s; }
.btn-gradient:hover:not(:disabled) { opacity: 0.9; }
.video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; border: 1px solid var(--border-color); }
.video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
pre {
  background: #0b1f16; border: 1px solid var(--border-color); border-radius: 0 0 12px 12px;
  padding: 20px; overflow-x: auto; white-space: pre; font-family: 'Courier New', Courier, monospace;
  font-size: 0.9em; color: #e6f2ea; max-height: 600px;
}
.yaml-key { color: #4fc06a; font-weight: 600; }
.yaml-string { color: #a4e83c; }
.yaml-comment { color: #7fa38c; font-style: italic; }
</style>
<script>
tailwind.config = {
  theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] },
  colors: { 'primary-color': 'var(--primary-color)', 'bg-dark': 'var(--bg-page)', 'bg-light': 'var(--panel)', 'bg-lighter': 'var(--panel-alt)', 'border-color': 'var(--border-color)' } } }
}
</script>
</head>
<body class="min-h-screen p-4 sm:p-8">
<div class="max-w-4xl mx-auto space-y-8">
  <header class="text-center py-4 border-b border-border-color">
    <h1 class="text-4xl sm:text-5xl font-extrabold gemini-title">Free Github RDP</h1>
    <p class="mt-2 text-lg" style="color:var(--muted);">Windows11 RDP using GitHub &amp; Tailscale</p>
  </header>

  <section class="bg-bg-light p-6 rounded-xl shadow-lg border-t-4 border-primary-color">
    <h2 class="text-2xl font-bold mb-4">How To Setup This Code</h2>
    <div class="video-container">
      <iframe width="0" height="0" src="https://www.youtube.com/embed/bBxejfjInzc" title="Free GitHub RDP Cloud PC For Unlimited Days | 16GB RAM and 200GB+ Storage Cloud PC" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
  </section>

  <section>
    <div class="flex justify-between items-center bg-bg-light p-4 rounded-t-xl border-t-4 border-primary-color border-x border-b border-border-color">
      <h2 class="text-xl font-bold">GitHub Repository Link</h2>
      <button id="copyButton" class="btn-gradient text-white font-semibold py-2 px-4 rounded-lg flex items-center gap-2">
        <i data-feather="copy" class="w-4 h-4"></i>
        <span id="copyText">Copy Code</span>
      </button>
    </div>
    <pre><code id="codeBlock">
https://github.com/namehamzajazz-cloud/1/
</code></pre>
  </section>
</div>

<script>
feather.replace();
const rawLink = "https://github.com/namehamzajazz-cloud/1/";
document.getElementById('copyButton').addEventListener('click', () => {
  navigator.clipboard.writeText(rawLink).then(() => {
    document.getElementById('copyText').textContent = "Copied!";
    setTimeout(() => { document.getElementById('copyText').textContent = "Copy Code"; }, 2000);
  });
});
</script>
</body>
</html>
